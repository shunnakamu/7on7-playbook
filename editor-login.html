<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7on7 Playbook - Editor Login</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .login-box {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 32px;
      width: 320px;
      text-align: center;
    }
    .login-box h2 {
      margin: 0 0 8px 0;
      color: #e94560;
      font-size: 18px;
    }
    .login-box p {
      margin: 0 0 20px 0;
      font-size: 13px;
      color: #888;
    }
    .login-box input {
      width: 100%;
      padding: 10px;
      border: 1px solid #0f3460;
      border-radius: 4px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 14px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }
    .login-box input:focus {
      outline: none;
      border-color: #4d96ff;
    }
    .login-box button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      background: #2d6a4f;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
    }
    .login-box button:hover {
      background: #3d8b6a;
    }
    .error {
      color: #e94560;
      font-size: 12px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>7on7 PLAYBOOK</h2>
    <p>Enter password to edit the playbook</p>
    <input type="password" id="password" placeholder="Password..." autofocus>
    <button id="btn-login">Login</button>
    <p class="error" id="error">Incorrect password</p>
  </div>
  <script>
    const pwInput = document.getElementById('password');
    const btn = document.getElementById('btn-login');
    const error = document.getElementById('error');

    async function doLogin() {
      error.style.display = 'none';
      const pw = pwInput.value;
      if (!pw) return;
      try {
        const res = await fetch('/api/editor/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
          credentials: 'same-origin'
        });
        if (res.ok) {
          window.location.href = '/editor';
        } else {
          error.style.display = 'block';
          pwInput.select();
        }
      } catch (e) {
        error.textContent = 'Connection error';
        error.style.display = 'block';
      }
    }

    btn.addEventListener('click', doLogin);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
