services:
  playbook:
    build: .
    ports:
      - "${EDITOR_PORT:-3000}:${EDITOR_PORT:-3000}"
      - "${VIEWER_PORT:-3001}:${VIEWER_PORT:-3001}"
    volumes:
      - ./playbook.db:/app/data/playbook.db
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/playbook.db
    restart: unless-stopped
