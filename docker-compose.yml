services:
  playbook:
    build: .
    ports:
      - "${HTTPS_PORT:-3443}:${HTTPS_PORT:-3443}"
      - "${HTTP_PORT:-3000}:${HTTP_PORT:-3000}"
    volumes:
      - ./playbook.db:/app/data/playbook.db
      - ./certs:/app/certs:ro
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/playbook.db
    restart: unless-stopped
